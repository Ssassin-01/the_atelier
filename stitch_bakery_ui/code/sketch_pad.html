<body class="bg-surface font-body text-on-surface antialiased overflow-hidden h-screen">
<!-- Background Layer: Recipe Entry Screen (Dimmed/Blurred) -->
<div class="fixed inset-0 z-0 blur-sm brightness-75 transition-all duration-500">
<!-- TopAppBar (Shared Component Mockup) -->
<header class="fixed top-0 w-full z-50 bg-[#fbf9f6]/80 backdrop-blur-xl flex justify-between items-center px-6 h-16">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">menu</span>
<span class="font-headline italic text-primary text-2xl font-semibold tracking-tight">Atelier Notes</span>
</div>
<span class="material-symbols-outlined text-primary">brush</span>
</header>
<main class="pt-24 px-6 max-w-screen-xl mx-auto space-y-8">
<h1 class="font-headline text-4xl text-primary font-bold">New Recipe</h1>
<div class="space-y-6">
<!-- Recipe Form -->
<div class="bg-surface-container-lowest p-8 rounded-lg shadow-sm border border-outline-variant/10">
<div class="grid grid-cols-1 md:grid-cols-4 gap-6">
<div class="md:col-span-2">
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2">Ingredient Name</label>
<div class="bg-surface-container-low p-4 rounded-md text-on-surface/50">Madagascar Vanilla Bean</div>
</div>
<div>
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2">Amount</label>
<div class="bg-surface-container-low p-4 rounded-md text-on-surface/50">2.5</div>
</div>
<div>
<label class="block font-label text-xs uppercase tracking-widest text-on-surface-variant mb-2">Unit</label>
<div class="bg-surface-container-low p-4 rounded-md text-on-surface/50">Grams</div>
</div>
</div>
</div>
<!-- Bento Grid Mockup for Background -->
<div class="grid grid-cols-3 gap-6 h-64">
<div class="bg-surface-container-low rounded-lg"></div>
<div class="col-span-2 bg-surface-container-high rounded-lg relative overflow-hidden">
<img class="absolute inset-0 w-full h-full object-cover opacity-30" data-alt="top-down view of a rustic chocolate cake on a wooden board with flour dusted around the edges" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABdzJfvWnXVHqGB6TjGJd8X-89oJwBOaeMPyT-U_LD7ViDCnX2cd0cBn-cpZyz5TTri1u2kEk9N5DUwF9QWudBYlTKt7HxebTCy2SN4B3OyMATxZGine3H6bv-FqJYsI0n0EG-pFAYVHx3RcHgH1QPNd3vw5heBE0Clnrl9y9BmYYvZxtfZ8-UnI4-Zxwaa71OlaWr_ldrk8wKr3jU2GeOFlGMJpZdi-CWnfcYVIe6Yvs3vlyde1n9kthiZ17_gVEi30hLq-f6ep8"/>
</div>
</div>
</div>
</main>
</div>
<!-- Overlay / Scrim -->
<div class="fixed inset-0 bg-on-surface/20 z-10 backdrop-blur-[2px]"></div>
<!-- Bottom Sheet Modal (Sketch Pad) -->
<div class="fixed bottom-0 left-0 right-0 z-50 h-[65%] bg-surface-container-lowest rounded-t-[3rem] shadow-[0_-20px_60px_-15px_rgba(27,28,26,0.15)] flex flex-col overflow-hidden">
<!-- Modal Header -->
<div class="px-8 pt-4 pb-6 flex flex-col items-center">
<div class="w-12 h-1.5 bg-outline-variant/30 rounded-full mb-6"></div>
<div class="w-full flex justify-between items-center">
<div class="w-10"></div> <!-- Spacer -->
<h2 class="font-headline text-3xl text-primary font-semibold">Idea Sketch</h2>
<button class="bg-tertiary-fixed-dim text-on-tertiary-fixed px-6 py-2 rounded-full font-bold text-sm tracking-wide transition-transform active:scale-95 shadow-sm">
                    SAVE
                </button>
</div>
</div>
<!-- Canvas Area -->
<div class="flex-1 relative mx-6 mb-32 rounded-lg paper-texture border border-outline-variant/10 shadow-inner overflow-hidden">
<!-- Simulated Hand Drawing -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<img class="w-[80%] max-w-md opacity-80 mix-blend-multiply" data-alt="a minimalist rough brown charcoal pencil sketch of a slice of layered cake on cream paper background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuC-CULQscIIBuSX-aDb9NJkB8CllPM4oOigx68vBRRt_h_Rv_Lk_yqedd3mJ6tm-L3kyOletcrGlfjWKg4HCwM4t_Qsz2jW8UczIh1gE8qDAdmexlfzIGbdwE-bnEpuKbprMKzAb6LZpql5JTwbJ4J3zDQpmUD13oEFdMR9nyVZ9qG8YwjblZE6GvYxsqVzWuWan_b_6LgS9lmPciNn7M8x_p_oCIOnGM1C98ng8y0eU1Gsg9dY5cKaJ5zHjNe5tfF3K78uHPKLbUo"/>
</div>
<!-- Floating Interaction Hints (Asymmetric Detail) -->
<div class="absolute top-8 left-8">
<span class="font-headline italic text-primary/30 text-sm tracking-widest">Base: Genoise Sponge</span>
</div>
</div>
<!-- Drawing Toolbar (Floating Pill) -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-[60] bg-on-surface/90 backdrop-blur-md px-8 py-4 rounded-full flex items-center gap-8 shadow-2xl border border-white/10">
<!-- Actions -->
<div class="flex items-center gap-4 pr-8 border-r border-white/10">
<button class="text-white/60 hover:text-white transition-colors">
<span class="material-symbols-outlined text-[20px]">undo</span>
</button>
<button class="relative group">
<div class="absolute -inset-2 bg-primary/40 rounded-full blur-md group-hover:bg-primary/60 transition-all"></div>
<span class="material-symbols-outlined text-white relative z-10" data-weight="fill">edit</span>
</button>
<button class="text-white/60 hover:text-white transition-colors">
<span class="material-symbols-outlined text-[20px]">ink_eraser</span>
</button>
</div>
<!-- Color Swatches -->
<div class="flex items-center gap-3">
<!-- Deep Brown -->
<button class="w-8 h-8 rounded-full bg-[#4A3B32] border-2 border-white/20 hover:scale-110 transition-transform"></button>
<!-- Terracotta -->
<button class="w-8 h-8 rounded-full bg-[#9C6644] border-2 border-white/20 hover:scale-110 transition-transform"></button>
<!-- Gold -->
<button class="w-8 h-8 rounded-full bg-[#E9C46A] border-2 border-white/20 hover:scale-110 transition-transform ring-2 ring-primary ring-offset-2 ring-offset-transparent"></button>
<!-- White -->
<button class="w-8 h-8 rounded-full bg-white border-2 border-white/20 hover:scale-110 transition-transform"></button>
</div>
</div>
</div>
